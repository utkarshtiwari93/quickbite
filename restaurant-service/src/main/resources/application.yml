server:
  port: 8082

spring:
  application:
    name: restaurant-service

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:mysql://host.docker.internal:3306/restaurant_db?createDatabaseIfNotExist=true
    username: root
    password: UTKARSH@123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # 🔥 changed
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: host.docker.internal   # 🔥 FIXED
      port: 6379

  kafka:
    bootstrap-servers: host.docker.internal:9092   # 🔥 FIXED
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  cache:
    type: redis
    redis:
      time-to-live: 600000

eureka:
  client:
    service-url:
      defaultZone: http://quickbite-eureka:8761/eureka/   # 🔥 FIXED
  instance:
    prefer-ip-address: true

