server:
  port: 8085

spring:
  application:
    name: delivery-service

  threads:
    virtual:
      enabled: true

  data:
    mongodb:
      uri: mongodb://host.docker.internal:27017/delivery_db   # ✅ FIXED (no auth, no localhost)

  kafka:
    bootstrap-servers: host.docker.internal:9092   # ✅ FIXED
    consumer:
      group-id: delivery-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: java.util.LinkedHashMap

eureka:
  client:
    service-url:
      defaultZone: http://quickbite-eureka:8761/eureka/   # ✅ FIXED
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always