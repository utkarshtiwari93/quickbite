name: QuickBite CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - api-gateway
          - user-service
          - restaurant-service
          - order-service
          - payment-service
          - delivery-service
          - notification-service
          - search-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build ${{ matrix.service }}
        run: cd ${{ matrix.service }} && mvn package -DskipTests --no-transfer-progress -q

  deployment-success:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: success()
    steps:
      - name: All services built successfully
        run: echo "All QuickBite services built successfully!"