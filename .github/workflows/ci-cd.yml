name: QuickBite CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_REGISTRY: ${{ secrets.DOCKER_USERNAME }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - eureka-server
          - api-gateway
          - user-service
          - restaurant-service
          - order-service
          - payment-service
          - delivery-service
          - notification-service
          - search-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build ${{ matrix.service }}
        run: cd ${{ matrix.service }} && mvn package -DskipTests --no-transfer-progress

      - name: Run Tests for ${{ matrix.service }}
        run: cd ${{ matrix.service }} && mvn test --no-transfer-progress

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    strategy:
      matrix:
        service:
          - eureka-server
          - api-gateway
          - user-service
          - restaurant-service
          - order-service
          - payment-service
          - delivery-service
          - notification-service
          - search-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for ${{ matrix.service }}
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REGISTRY }}/quickbite-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_REGISTRY }}/quickbite-${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_REGISTRY }}/quickbite-${{ matrix.service }}:buildcache,mode=max

  deployment-success:
    needs: docker-build
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Deployment Success
        run: |
          echo "✅ CI/CD Pipeline Completed Successfully!"
          echo "🐳 All 9 services built and pushed to Docker Hub"
          echo "📍 Registry: ${{ env.REGISTRY }}"
          echo "👤 Docker Username: ${{ env.IMAGE_REGISTRY }}"

