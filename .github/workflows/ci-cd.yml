jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # ← ADD THIS! Don't cancel other jobs if one fails
      matrix:
        service:
          - eureka-server
          - api-gateway
          - user-service
          - restaurant-service
          - order-service
          - payment-service
          - delivery-service
          - notification-service
          - search-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven  # ← Cache Maven dependencies!

      - name: Build ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          mvn package -DskipTests --no-transfer-progress -q
